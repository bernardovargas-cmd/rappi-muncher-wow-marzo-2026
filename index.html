const coverStats = {"gmv":342974895,"orders":4947,"sessions":25901,"conversion":19.099648662213813};
function fmtNumber(v){return new Intl.NumberFormat('es-CO',{maximumFractionDigits:0}).format(Math.round(v||0));}
function fmtMillions(v){return '$'+(v/1e6).toFixed(1)+'M';}
function fmtMoneyInt(v){return '$'+fmtNumber(v);}
function fmtPct1(v){return (v??0).toFixed(1)+'%';}
function fmtPct2(v){return (v??0).toFixed(2)+'%';}
function fmtX1(v){return (v??0).toFixed(1)+'x';}
function formatBy(t,v){if(t==='int')return fmtNumber(v); if(t==='moneyM')return fmtMillions(v); if(t==='moneyInt')return fmtMoneyInt(v); if(t==='pct1')return fmtPct1(v); if(t==='pct2')return fmtPct2(v); if(t==='x1')return fmtX1(v); return String(v??'');}
function deltaClass(v){if(v===null||v===undefined||Number.isNaN(v))return'neu'; if(v>0)return'pos'; if(v<0)return'neg'; return'neu';}
function deltaHtml(v,l){return '<div class="delta '+deltaClass(v)+'">'+(v==null?'n/d':(v>0?'+':'')+v.toFixed(1)+'%')+'<small>'+l+'</small></div>';}
function renderCover(){return '<div class="slide cover"><div class="cover-chips"><div class="cover-chip">Franco</div><div class="cover-chip">Nimis</div><div class="cover-chip">Good Hands</div><div class="cover-chip">Chiki Chiki</div></div><div class="cover-title">Muncher</div><div class="cover-sub">Marzo 2026</div><div class="cover-grid"><div class="cover-card"><div class="value">'+fmtMillions(coverStats.gmv)+'</div><div class="label">Venta Neta</div></div><div class="cover-card"><div class="value">'+fmtNumber(coverStats.orders)+'</div><div class="label">Ordenes</div></div><div class="cover-card"><div class="value">'+fmtNumber(coverStats.sessions)+'</div><div class="label">Trafico</div></div><div class="cover-card"><div class="value">'+fmtPct1(coverStats.conversion)+'</div><div class="label">Conversion</div></div></div><div class="logo">RAPPI</div></div>';}
function renderSection(slide){return '<div class="slide section"><div class="section-word">Ventas-</div><div class="section-word">Ordenes</div><div class="section-sub">'+slide.subtitle+'</div><div class="logo">RAPPI</div></div>';}
function chartCard(id,chart){return '<div class="chart-card"><div class="chart-label">'+chart.label+'</div><div class="chart-wrap"><canvas id="'+id+'"></canvas></div></div>';}
function metricCard(card){return '<div class="card"><div class="card-value">'+formatBy(card.format,card.value)+'</div><div class="card-label">'+card.label+'</div><div class="delta-grid">'+deltaHtml(card.wow,'Vs LW')+deltaHtml(card.l5,'Vs L5W')+deltaHtml(card.l8,'Vs L8W')+'</div></div>';}
function renderMetric(slide,index){return '<div class="slide metric-slide" id="slide-'+index+'"><div class="slide-head"><div><div class="title">'+slide.title+'</div><div class="subtitle">CO · 13 semanas cerradas · 2025-12-29 a 2026-03-23</div></div><div class="badge">'+slide.badge+'</div></div><div class="metric-grid"><div class="chart-stack">'+slide.charts.map((chart,i)=>chartCard('chart-'+index+'-'+i,chart)).join('')+'</div><div class="card-stack">'+slide.cards.map(metricCard).join('')+'</div></div><div class="logo">RAPPI</div></div>';}
function renderDual(slide,index){return '<div class="slide dual-slide" id="slide-'+index+'"><div class="slide-head"><div><div class="title">'+slide.title+'</div><div class="subtitle">'+slide.subtitle+'</div></div></div><div class="dual-stack">'+slide.rows.map((row,i)=>'<div class="trend-card"><div class="chart-label">'+row.label+'</div><div class="chart-wrap"><canvas id="trend-'+index+'-'+i+'"></canvas></div></div>').join('')+'</div><div class="logo">RAPPI</div></div>';}
function adsRow(cells){return '<tr>'+cells.map((cell)=>'<td>'+cell+'</td>').join('')+'</tr>';}
function renderAds(slide,index){const summary=slide.tableRows.map(([label,row])=>adsRow([label,fmtNumber(row.adsImpressions),fmtPct2(row.ctr),fmtNumber(row.adsClicks),fmtPct1(row.conversionAds),fmtNumber(row.adsOrders),fmtMoneyInt(row.adsTicket),fmtMoneyInt(row.adsSales),fmtMoneyInt(row.revenueUsed),fmtPct1(row.budgetExec),fmtX1(row.roas),fmtMoneyInt(row.cpc)])).join(''); const brands=(slide.brandRows||[]).map(([label,row])=>adsRow([label,fmtNumber(row.adsImpressions),fmtPct2(row.ctr),fmtNumber(row.adsClicks),fmtPct1(row.conversionAds),fmtNumber(row.adsOrders),fmtMoneyInt(row.adsTicket),fmtMoneyInt(row.adsSales),fmtMoneyInt(row.revenueUsed),fmtX1(row.roas)])).join(''); return '<div class="slide ads-slide" id="slide-'+index+'"><div class="slide-head"><div><div class="title">'+slide.title+'</div><div class="subtitle">'+slide.subtitle+'</div></div></div><div class="ads-kpis">'+slide.cards.map((card)=>'<div class="ads-kpi"><div class="value">'+formatBy(card.format,card.value)+'</div><div class="label">'+card.label+'</div></div>').join('')+'</div><div class="ads-layout"><div class="table-wrap"><table><thead><tr><th>Periodo</th><th>Imp</th><th>CTR</th><th>Clicks</th><th>Conv</th><th>Ord</th><th>Ticket</th><th>Ventas</th><th>Revenue</th><th>Budget %</th><th>ROAS</th><th>CPC</th></tr></thead><tbody>'+summary+'</tbody></table></div><div class="table-wrap brand-table"><table><thead><tr><th>Grupo</th><th>Imp</th><th>CTR</th><th>Clicks</th><th>Conv</th><th>Ord</th><th>Ticket</th><th>Ventas</th><th>Revenue</th><th>ROAS</th></tr></thead><tbody>'+brands+'</tbody></table></div></div><div class="logo">RAPPI</div></div>';}
function renderClosing(){return '<div class="slide closing"><div class="closing-title">Muncher</div><div class="closing-sub">Marzo 2026</div><div class="logo">RAPPI</div></div>';}
const deck=document.getElementById('deck'); SLIDES.forEach((slide,index)=>{if(slide.type==='cover')deck.innerHTML+=renderCover(); else if(slide.type==='section')deck.innerHTML+=renderSection(slide); else if(slide.type==='metric')deck.innerHTML+=renderMetric(slide,index); else if(slide.type==='dualTrend')deck.innerHTML+=renderDual(slide,index); else if(slide.type==='ads')deck.innerHTML+=renderAds(slide,index); else if(slide.type==='closing')deck.innerHTML+=renderClosing();});
const slidesEls=Array.from(document.querySelectorAll('.slide')); const chartStore={};
function initChart(canvasId,chart){if(chartStore[canvasId])return; const canvas=document.getElementById(canvasId); if(!canvas)return; const isLine=chart.chartType==='line'; chartStore[canvasId]=new Chart(canvas,{type:isLine?'line':'bar',data:{labels:WEEKS.map((week)=>week.slice(5)),datasets:[{data:chart.values,backgroundColor:isLine?'transparent':chart.color+'cc',borderColor:chart.color,borderWidth:isLine?2.5:0,pointRadius:isLine?3:0,pointHoverRadius:isLine?5:0,pointBackgroundColor:chart.color,borderRadius:6,tension:.35,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{displayColors:false,callbacks:{label(ctx){return formatBy(chart.format,ctx.parsed.y);}}}},scales:{x:{grid:{display:false},border:{display:false},ticks:{color:'#aaa',font:{size:9},maxRotation:0,autoSkip:true}},y:{grid:{color:'rgba(0,0,0,.05)'},border:{display:false},ticks:{color:'#aaa',font:{size:9},callback(v){return formatBy(chart.format,v);}}}}}});}
function initSlideCharts(index){const slide=SLIDES[index]; if(!slide)return; if(slide.type==='metric')slide.charts.forEach((chart,i)=>initChart('chart-'+index+'-'+i,chart)); if(slide.type==='dualTrend')slide.rows.forEach((row,i)=>initChart('trend-'+index+'-'+i,{chartType:'line',color:row.color,format:'int',values:row.values}));}
let cur=0; function go(next){if(next<0||next>=slidesEls.length)return; slidesEls[cur].classList.remove('active'); cur=next; slidesEls[cur].classList.add('active'); initSlideCharts(cur); initSlideCharts(cur+1); document.getElementById('counter').textContent=(cur+1)+' / '+slidesEls.length; document.getElementById('progress').style.width=((cur/(slidesEls.length-1))*100)+'%';}
document.addEventListener('keydown',(event)=>{if(event.key==='ArrowRight'||event.key===' ')go(cur+1); if(event.key==='ArrowLeft')go(cur-1);}); go(0);
